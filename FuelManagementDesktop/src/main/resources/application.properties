# ==============================================
# Fuel Management System - Application Properties
# ==============================================
# Всі чутливі дані беруться зі змінних середовища
# Див. .env.example для списку необхідних змінних

# ===== Database Configuration =====
database.url=${DATABASE_URL:jdbc:mysql://localhost:3306/fuel_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Kiev}
database.username=${DATABASE_USERNAME:root}
database.password=${DATABASE_PASSWORD:}
database.driver=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

# ===== Connection Pool =====
database.pool.maximum=${DATABASE_POOL_MAXIMUM:10}
database.pool.minimum=${DATABASE_POOL_MINIMUM:2}
database.pool.timeout=${DATABASE_POOL_TIMEOUT:30000}

# ===== Google Maps API =====
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}
google.maps.api.url=${GOOGLE_MAPS_API_URL:https://maps.googleapis.com/maps/api}

# ===== Email Configuration =====
email.server=${EMAIL_SERVER:imap.gmail.com}
email.port=${EMAIL_PORT:993}
email.username=${EMAIL_USERNAME:}
email.password=${EMAIL_PASSWORD:}
email.protocol=${EMAIL_PROTOCOL:imaps}
email.check.interval=${EMAIL_CHECK_INTERVAL:300000}

# ===== Application Settings =====
application.title=${APPLICATION_TITLE:Система обліку палива}
application.version=${APPLICATION_VERSION:1.0.0}
reports.output.directory=${REPORTS_OUTPUT_DIRECTORY:./reports}
temp.directory=${TEMP_DIRECTORY:./temp}

# ===== Fuel Calculation =====
fuel.calculation.enabled=${FUEL_CALCULATION_ENABLED:true}
fuel.calculation.show.details=${FUEL_CALCULATION_SHOW_DETAILS:true}

# ===== Route Settings =====
route.auto.calculate=${ROUTE_AUTO_CALCULATE:true}
route.calculation.delay.ms=${ROUTE_CALCULATION_DELAY_MS:2000}
